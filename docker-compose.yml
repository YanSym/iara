version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# IAra Multi-Tenant Agent Runtime — Local Development Infrastructure
# Start with: make up  (postgres + rabbitmq only)
#          or: make up-all  (full stack)
# ─────────────────────────────────────────────────────────────────────────────

x-common-env: &common-env
  IARA_ENV: development
  DATABASE_URL: postgresql+asyncpg://iara:iara_dev@postgres:5432/iara_dev
  RABBITMQ_URL: amqp://iara:iara_dev@rabbitmq:5672/iara

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: iara_postgres
    environment:
      POSTGRES_USER: iara
      POSTGRES_PASSWORD: iara_dev
      POSTGRES_DB: iara_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iara -d iara_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: iara_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: iara
      RABBITMQ_DEFAULT_PASS: iara_dev
      RABBITMQ_DEFAULT_VHOST: iara
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── API (optional — use `make run` for hot reload) ────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iara_api
    profiles: ["full"]
    environment:
      <<: *common-env
      IARA_RELOAD: "false"
      LOG_FORMAT: json
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker (optional) ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iara_worker
    profiles: ["full"]
    command: ["python", "-m", "iara.workers.main"]
    environment:
      <<: *common-env
      LOG_FORMAT: json
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
